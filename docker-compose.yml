services:
  app:
    build: .
    container_name: filago-app
    restart: always
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: root_password
      DB_NAME: filago
    depends_on:
      - db

  db:
    image: mariadb:10.11
    container_name: filago-db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: filago
    volumes:
      - ./filago.sql:/docker-entrypoint-initdb.d/filago.sql
      - db_data:/var/lib/mysql

volumes:
  db_data:
