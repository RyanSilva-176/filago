<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cliente - Filago</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <nav class="navbar">
    <div class="nav-logo">Filago</div>
    <div class="nav-buttons">
      <button onclick="goto('index.html')">Início</button>
      <button onclick="goto('configuracao.html')">Configuração</button>
      <button onclick="goto('cliente.html')">Cliente</button>
      <button onclick="goto('admin.html')">Admin</button>
      <button onclick="goto('qrcode.html')">QR Code</button>
    </div>
  </nav>

  <main>
    <h2>Entrar na Fila</h2>
    <form id="formFila">
      <label>Nome</label>
      <input type="text" name="nome" id="nome" required>
      <label>Empresa</label>
      <select name="empresa_id" id="empresa_id" required></select>
      <button type="submit">Entrar na Fila</button>
    </form>
    <div id="msg" class="msg"></div>

    <script>
      document.addEventListener('DOMContentLoaded', async () => {
        await carregarEmpresas('empresa_id');
        // Pre-select by query param ?empresa=ID
        const urlParams = new URLSearchParams(location.search);
        const e = urlParams.get('empresa');
        if (e) document.getElementById('empresa_id').value = e;
        document.getElementById('formFila').addEventListener('submit', async (ev) => {
          ev.preventDefault();
          const data = new FormData(ev.target);
          const res = await fetch('api/entrar_fila.php', { method: 'POST', body: data });
          const txt = await res.text();
          showMessage(txt, 'ok');
          ev.target.reset();
        });
      });
    </script>
  </main>
</body>
</html>
